@'
options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/my-website-image/my-website-image:latest'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/my-website-image/my-website-image:latest'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'my-website-service'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/my-website-image/my-website-image:latest'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
'@ | Set-Content -Path .\cloudbuild.yaml
