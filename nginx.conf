user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    # Ensure JSON files are served with correct MIME type and caching
    types {
        application/json json;
    }

    server {
        # Changed from 80 to 8080 for Google Cloud Run compatibility
        listen 8080;
        server_name localhost;

        root /usr/share/nginx/html;
        index index.html index.htm;

        # Serve static assets with caching (but not JSON to allow updates)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1h;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # JSON files: no cache to allow instant data updates
        location ~* \.json$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
            access_log off;
        }

        location / {
            # Added $uri.html so links like /about load beautifully
            try_files $uri $uri/ $uri.html =404;
        }
    }
}
